<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4dff85" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4dff85" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3defff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#3defff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineFadeH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4dff85" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4dff85" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3defff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineFadeH2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3defff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3defff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4dff85" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#4dff85" fill-opacity="0.18"/>
    </pattern>
    <pattern id="diag" width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#3defff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <linearGradient id="baseFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070d" stop-opacity="0"/>
      <stop offset="65%" stop-color="#07070d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#07070d"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="1600" height="700" fill="#07070d"/>
  <rect width="1600" height="700" fill="url(#diag)"/>
  <rect width="1600" height="700" fill="url(#dots)"/>

  <!-- soft floating glow orbs, scattered -->
  <circle cx="220" cy="140" r="180" fill="url(#glowA)"/>
  <circle cx="1360" cy="120" r="220" fill="url(#glowB)"/>
  <circle cx="760" cy="60" r="150" fill="url(#glowA)" opacity="0.7"/>
  <circle cx="1080" cy="380" r="240" fill="url(#glowB)" opacity="0.6"/>
  <circle cx="60" cy="440" r="200" fill="url(#glowA)" opacity="0.5"/>

  <!-- large sweeping diagonal bands, full width -->
  <g stroke-width="1.5" fill="none">
    <path d="M -100 60 L 1700 220" stroke="url(#lineFadeH)"/>
    <path d="M -100 140 L 1700 320" stroke="url(#lineFadeH2)" opacity="0.7"/>
    <path d="M -100 260 L 1700 60" stroke="url(#lineFadeH)" opacity="0.55"/>
    <path d="M -100 420 L 1700 180" stroke="url(#lineFadeH2)" opacity="0.5"/>
    <path d="M -100 520 L 1700 400" stroke="url(#lineFadeH)" opacity="0.4"/>
    <path d="M -100 620 L 1700 480" stroke="url(#lineFadeH2)" opacity="0.35"/>
  </g>

  <!-- angular circuit-style connector lines scattered across full canvas -->
  <g stroke-width="1.3" fill="none" opacity="0.55">
    <path d="M 0 90 L 140 90 L 180 130 L 380 130 L 420 90 L 640 90" stroke="#4dff85"/>
    <path d="M 700 40 L 700 110 L 760 170 L 1000 170" stroke="#3defff"/>
    <path d="M 1080 30 L 1080 100 L 1140 160 L 1360 160 L 1400 200 L 1600 200" stroke="#4dff85"/>
    <path d="M 60 260 L 60 340 L 120 400 L 340 400" stroke="#3defff"/>
    <path d="M 440 300 L 620 300 L 660 260 L 900 260" stroke="#4dff85"/>
    <path d="M 980 300 L 980 380 L 1040 440 L 1300 440" stroke="#3defff"/>
    <path d="M 1420 300 L 1420 380 L 1480 440 L 1600 440" stroke="#4dff85"/>
    <path d="M 0 480 L 200 480 L 240 520 L 480 520" stroke="#3defff"/>
    <path d="M 540 560 L 780 560 L 820 600 L 1060 600" stroke="#4dff85"/>
    <path d="M 1120 540 L 1320 540 L 1360 580 L 1600 580" stroke="#3defff"/>
  </g>

  <!-- via / node dots at line junctions -->
  <g fill="#4dff85">
    <circle cx="140" cy="90" r="3"/><circle cx="380" cy="130" r="3"/>
    <circle cx="700" cy="110" r="3" fill="#3defff"/><circle cx="1000" cy="170" r="3" fill="#3defff"/>
    <circle cx="1080" cy="100" r="3"/><circle cx="1360" cy="160" r="3"/>
    <circle cx="60" cy="340" r="3" fill="#3defff"/><circle cx="340" cy="400" r="3" fill="#3defff"/>
    <circle cx="620" cy="300" r="3"/><circle cx="900" cy="260" r="3"/>
    <circle cx="980" cy="380" r="3" fill="#3defff"/><circle cx="1300" cy="440" r="3" fill="#3defff"/>
    <circle cx="1420" cy="380" r="3"/><circle cx="1600" cy="440" r="3"/>
    <circle cx="200" cy="480" r="3" fill="#3defff"/><circle cx="480" cy="520" r="3" fill="#3defff"/>
    <circle cx="780" cy="560" r="3"/><circle cx="1060" cy="600" r="3"/>
    <circle cx="1320" cy="540" r="3" fill="#3defff"/>
  </g>

  <!-- hex outline cluster, decorative, upper-mid -->
  <g stroke="#4dff85" stroke-opacity="0.3" stroke-width="1.2" fill="none">
    <polygon points="820,50 850,68 850,104 820,122 790,104 790,68"/>
    <polygon points="880,80 910,98 910,134 880,152 850,134 850,98"/>
    <polygon points="760,90 790,108 790,144 760,162 730,144 730,108"/>
  </g>
  <g stroke="#3defff" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <polygon points="1440,260 1470,278 1470,314 1440,332 1410,314 1410,278"/>
    <polygon points="1500,290 1530,308 1530,344 1500,362 1470,344 1470,308"/>
  </g>

  <!-- floating blurred accent orbs for depth -->
  <circle cx="1500" cy="500" r="60" fill="#4dff85" opacity="0.10" filter="url(#blur1)"/>
  <circle cx="120" cy="600" r="70" fill="#3defff" opacity="0.10" filter="url(#blur1)"/>
  <circle cx="900" cy="50" r="50" fill="#4dff85" opacity="0.08" filter="url(#blur1)"/>

  <!-- vignette so foreground text remains legible -->
  <rect width="1600" height="700" fill="url(#baseFade)"/>
  <rect width="1600" height="700" fill="#07070d" opacity="0.25"/>
</svg>
